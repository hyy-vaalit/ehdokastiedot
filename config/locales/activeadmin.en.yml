# ActiveAdmin lives in its own file: a second top-level `en:` key in
# hyyvaalit.en.yml would silently discard the first block (YAML last-key-wins).
en:
  # https://github.com/activeadmin/activeadmin/blob/master/config/locales/en.yml
  active_admin:
    blank_slate:
      content: "Current scope for %{resource_name} does not have any entries."
    cancel: "Return without saving"
